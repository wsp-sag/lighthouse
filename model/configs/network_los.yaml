taz_skims:
  - hwy*.omx
  - ta*.omx
  - tw*.omx
  - nm*.omx

skim_time_periods:
  time_window: 1440
  period_minutes: 60
  periods: [0, 5, 8, 14, 18, 24] # right edge is inclusive
  labels: [EV, AM, MD, PM, EV]
